<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="1200" height="480" fill="#111111"/>
  <!-- Grid -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="480"/>
    <line x1="600" y1="0" x2="600" y2="480"/>
    <line x1="900" y1="0" x2="900" y2="480"/>
  </g>

  <!-- Left: big number -->
  <text x="80" y="300" font-family="Georgia, serif" font-size="220" fill="#1a1a1a" letter-spacing="-10">12</text>
  <text x="80" y="350" font-family="'Geist Mono', monospace" font-size="11" fill="#787774" letter-spacing="3">ITEMS TO CHECK</text>

  <!-- Divider -->
  <line x1="380" y1="60" x2="380" y2="420" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Checklist items: two columns -->
  <!-- Col 1 -->
  <g font-family="'Geist Mono', monospace" font-size="11">
    <!-- item 1 -->
    <rect x="420" y="72" width="340" height="44" rx="4" fill="#1a1a1a"/>
    <text x="440" y="89" fill="#787774" letter-spacing="1">01</text>
    <text x="476" y="89" fill="#F7F6F3">Page title tag</text>
    <line x1="440" y1="104" x2="744" y2="104" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="740" y="82" width="8" height="8" rx="2" fill="#F7F6F3"/>
    <!-- item 2 -->
    <rect x="420" y="120" width="340" height="44" rx="4" fill="#1a1a1a"/>
    <text x="440" y="137" fill="#787774" letter-spacing="1">02</text>
    <text x="476" y="137" fill="#F7F6F3">Meta description</text>
    <line x1="440" y1="152" x2="744" y2="152" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="740" y="130" width="8" height="8" rx="2" fill="#F7F6F3"/>
    <!-- item 3 -->
    <rect x="420" y="168" width="340" height="44" rx="4" fill="#1a1a1a"/>
    <text x="440" y="185" fill="#787774" letter-spacing="1">03</text>
    <text x="476" y="185" fill="#F7F6F3">H1 heading</text>
    <line x1="440" y1="200" x2="744" y2="200" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="740" y="178" width="8" height="8" rx="2" fill="#F7F6F3"/>
    <!-- item 4 -->
    <rect x="420" y="216" width="340" height="44" rx="4" fill="#1a1a1a"/>
    <text x="440" y="233" fill="#787774" letter-spacing="1">04</text>
    <text x="476" y="233" fill="#F7F6F3">Mobile responsive</text>
    <line x1="440" y1="248" x2="744" y2="248" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="740" y="226" width="8" height="8" rx="2" fill="#F7F6F3"/>
    <!-- item 5 -->
    <rect x="420" y="264" width="340" height="44" rx="4" fill="#1a1a1a"/>
    <text x="440" y="281" fill="#787774" letter-spacing="1">05</text>
    <text x="476" y="281" fill="#F7F6F3">Page speed &lt; 3s</text>
    <line x1="440" y1="296" x2="744" y2="296" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="740" y="274" width="8" height="8" rx="2" fill="#F7F6F3"/>
    <!-- item 6 -->
    <rect x="420" y="312" width="340" height="44" rx="4" fill="#1a1a1a"/>
    <text x="440" y="329" fill="#787774" letter-spacing="1">06</text>
    <text x="476" y="329" fill="#F7F6F3">SSL certificate</text>
    <line x1="440" y1="344" x2="744" y2="344" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="740" y="322" width="8" height="8" rx="2" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  </g>

  <!-- Col 2 -->
  <g font-family="'Geist Mono', monospace" font-size="11">
    <rect x="780" y="72" width="340" height="44" rx="4" fill="#1a1a1a"/>
    <text x="800" y="89" fill="#787774" letter-spacing="1">07</text>
    <text x="836" y="89" fill="#F7F6F3">Contact method</text>
    <line x1="800" y1="104" x2="1104" y2="104" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="1100" y="82" width="8" height="8" rx="2" fill="#F7F6F3"/>

    <rect x="780" y="120" width="340" height="44" rx="4" fill="#1a1a1a"/>
    <text x="800" y="137" fill="#787774" letter-spacing="1">08</text>
    <text x="836" y="137" fill="#F7F6F3">Optimised images</text>
    <line x1="800" y1="152" x2="1104" y2="152" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="1100" y="130" width="8" height="8" rx="2" fill="#F7F6F3"/>

    <rect x="780" y="168" width="340" height="44" rx="4" fill="#1a1a1a"/>
    <text x="800" y="185" fill="#787774" letter-spacing="1">09</text>
    <text x="836" y="185" fill="#F7F6F3">Sitemap submitted</text>
    <line x1="800" y1="200" x2="1104" y2="200" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="1100" y="178" width="8" height="8" rx="2" fill="#2a2a2a" stroke="#444" stroke-width="1"/>

    <rect x="780" y="216" width="340" height="44" rx="4" fill="#1a1a1a"/>
    <text x="800" y="233" fill="#787774" letter-spacing="1">10</text>
    <text x="836" y="233" fill="#F7F6F3">Analytics tracking</text>
    <line x1="800" y1="248" x2="1104" y2="248" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="1100" y="226" width="8" height="8" rx="2" fill="#2a2a2a" stroke="#444" stroke-width="1"/>

    <rect x="780" y="264" width="340" height="44" rx="4" fill="#1a1a1a"/>
    <text x="800" y="281" fill="#787774" letter-spacing="1">11</text>
    <text x="836" y="281" fill="#F7F6F3">Open Graph tags</text>
    <line x1="800" y1="296" x2="1104" y2="296" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="1100" y="274" width="8" height="8" rx="2" fill="#2a2a2a" stroke="#444" stroke-width="1"/>

    <rect x="780" y="312" width="340" height="44" rx="4" fill="#1a1a1a"/>
    <text x="800" y="329" fill="#787774" letter-spacing="1">12</text>
    <text x="836" y="329" fill="#F7F6F3">Clear call to action</text>
    <line x1="800" y1="344" x2="1104" y2="344" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="1100" y="322" width="8" height="8" rx="2" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  </g>

  <!-- Footer -->
  <text x="600" y="455" font-family="'Geist Mono', monospace" font-size="10" fill="#444444" text-anchor="middle" letter-spacing="2">PRE-LAUNCH CHECKLIST · AISTRION.COM</text>
</svg>
