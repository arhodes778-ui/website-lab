<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480">
  <!-- Background -->
  <rect width="1200" height="480" fill="#111111"/>
  <!-- Grid -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="480"/>
  </g>

  <!-- Left: CRO side -->
  <text x="80" y="130" font-family="'Geist Mono', monospace" font-size="11" fill="#787774" letter-spacing="3">OPTION A</text>
  <text x="80" y="195" font-family="Georgia, serif" font-size="52" fill="#F7F6F3" letter-spacing="-2">Conversion</text>
  <text x="80" y="255" font-family="Georgia, serif" font-size="52" fill="#F7F6F3" letter-spacing="-2">Optimisation</text>

  <!-- CRO signals -->
  <g font-family="'Geist Mono', monospace" font-size="10" fill="#787774">
    <text x="80" y="300" letter-spacing="1">· Refine copy and headlines</text>
    <text x="80" y="320" letter-spacing="1">· Add trust signals</text>
    <text x="80" y="340" letter-spacing="1">· Improve calls to action</text>
    <text x="80" y="360" letter-spacing="1">· A/B test key pages</text>
  </g>

  <!-- CRO bar chart (before/after) -->
  <rect x="80" y="390" width="40" height="50" rx="3" fill="#2a2a2a"/>
  <rect x="130" y="370" width="40" height="70" rx="3" fill="#2a2a2a"/>
  <rect x="180" y="350" width="40" height="90" rx="3" fill="#787774" opacity="0.6"/>
  <rect x="230" y="320" width="40" height="120" rx="3" fill="#F7F6F3" opacity="0.8"/>
  <rect x="80" y="440" width="190" height="1" fill="#2a2a2a"/>

  <!-- Divider line -->
  <line x1="600" y1="60" x2="600" y2="420" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="600" y="455" font-family="'Geist Mono', monospace" font-size="9" fill="#444444" text-anchor="middle" letter-spacing="2">VS</text>

  <!-- Right: Redesign side -->
  <text x="660" y="130" font-family="'Geist Mono', monospace" font-size="11" fill="#787774" letter-spacing="3">OPTION B</text>
  <text x="660" y="195" font-family="Georgia, serif" font-size="52" fill="#F7F6F3" letter-spacing="-2">Full</text>
  <text x="660" y="255" font-family="Georgia, serif" font-size="52" fill="#F7F6F3" letter-spacing="-2">Redesign</text>

  <!-- Redesign signals -->
  <g font-family="'Geist Mono', monospace" font-size="10" fill="#787774">
    <text x="660" y="300" letter-spacing="1">· New visual design system</text>
    <text x="660" y="320" letter-spacing="1">· Rebuild site structure</text>
    <text x="660" y="340" letter-spacing="1">· Mobile-first development</text>
    <text x="660" y="360" letter-spacing="1">· New brand expression</text>
  </g>

  <!-- Before/after mockup -->
  <rect x="660" y="385" width="180" height="110" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="668" y="393" width="164" height="10" rx="2" fill="#2a2a2a"/>
  <rect x="668" y="409" width="100" height="6" rx="1" fill="#2a2a2a"/>
  <rect x="668" y="421" width="130" height="6" rx="1" fill="#2a2a2a"/>
  <rect x="668" y="433" width="80" height="6" rx="1" fill="#2a2a2a"/>
  <rect x="668" y="450" width="60" height="20" rx="3" fill="#F7F6F3" opacity="0.15"/>
  <!-- Arrow pointing right -->
  <text x="855" y="445" font-family="Georgia, serif" font-size="24" fill="#444444">→</text>
  <rect x="880" y="385" width="180" height="110" rx="4" fill="#F7F6F3" opacity="0.05" stroke="#787774" stroke-width="1"/>
  <rect x="888" y="393" width="164" height="10" rx="2" fill="#787774" opacity="0.3"/>
  <rect x="888" y="409" width="100" height="6" rx="1" fill="#787774" opacity="0.2"/>
  <rect x="888" y="421" width="130" height="6" rx="1" fill="#787774" opacity="0.2"/>
  <rect x="888" y="433" width="80" height="6" rx="1" fill="#787774" opacity="0.2"/>
  <rect x="888" y="450" width="60" height="20" rx="3" fill="#F7F6F3" opacity="0.3"/>

  <!-- Footer -->
  <text x="600" y="472" font-family="'Geist Mono', monospace" font-size="10" fill="#444444" text-anchor="middle" letter-spacing="2">CRO VS REDESIGN · AISTRION.COM</text>
</svg>
