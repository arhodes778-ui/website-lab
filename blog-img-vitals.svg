<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="1200" height="480" fill="#111111"/>
  <!-- Subtle grid -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="480"/>
    <line x1="480" y1="0" x2="480" y2="480"/>
    <line x1="720" y1="0" x2="720" y2="480"/>
    <line x1="960" y1="0" x2="960" y2="480"/>
  </g>

  <!-- LCP card -->
  <rect x="60" y="80" width="320" height="320" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="88" y="130" font-family="'Geist Mono', monospace" font-size="11" fill="#787774" letter-spacing="3">METRIC 01</text>
  <text x="88" y="195" font-family="Georgia, serif" font-size="72" fill="#F7F6F3" letter-spacing="-3">LCP</text>
  <text x="88" y="230" font-family="'Geist Mono', monospace" font-size="11" fill="#787774" letter-spacing="1">Largest Contentful Paint</text>
  <!-- Progress bar -->
  <rect x="88" y="270" width="260" height="4" rx="2" fill="#2a2a2a"/>
  <rect x="88" y="270" width="195" height="4" rx="2" fill="#F7F6F3"/>
  <text x="88" y="310" font-family="Georgia, serif" font-size="28" fill="#F7F6F3">&lt; 2.5s</text>
  <text x="88" y="335" font-family="'Geist Mono', monospace" font-size="10" fill="#787774" letter-spacing="1">TARGET THRESHOLD</text>
  <!-- Good indicator -->
  <rect x="88" y="358" width="52" height="22" rx="4" fill="#2a2a2a"/>
  <text x="114" y="373" font-family="'Geist Mono', monospace" font-size="9" fill="#F7F6F3" text-anchor="middle" letter-spacing="1">GOOD</text>

  <!-- CLS card -->
  <rect x="440" y="80" width="320" height="320" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="468" y="130" font-family="'Geist Mono', monospace" font-size="11" fill="#787774" letter-spacing="3">METRIC 02</text>
  <text x="468" y="195" font-family="Georgia, serif" font-size="72" fill="#F7F6F3" letter-spacing="-3">CLS</text>
  <text x="468" y="230" font-family="'Geist Mono', monospace" font-size="11" fill="#787774" letter-spacing="1">Cumulative Layout Shift</text>
  <!-- Stability visual -->
  <rect x="468" y="255" width="260" height="32" rx="4" fill="#2a2a2a"/>
  <rect x="468" y="255" width="260" height="32" rx="4" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="472" y="259" width="120" height="24" rx="3" fill="#787774" opacity="0.4"/>
  <rect x="468" y="300" width="260" height="32" rx="4" fill="#2a2a2a"/>
  <rect x="472" y="304" width="120" height="24" rx="3" fill="#F7F6F3" opacity="0.15"/>
  <text x="468" y="368" font-family="Georgia, serif" font-size="28" fill="#F7F6F3">&lt; 0.1</text>
  <text x="468" y="390" font-family="'Geist Mono', monospace" font-size="10" fill="#787774" letter-spacing="1">TARGET THRESHOLD</text>

  <!-- INP card -->
  <rect x="820" y="80" width="320" height="320" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="848" y="130" font-family="'Geist Mono', monospace" font-size="11" fill="#787774" letter-spacing="3">METRIC 03</text>
  <text x="848" y="195" font-family="Georgia, serif" font-size="72" fill="#F7F6F3" letter-spacing="-3">INP</text>
  <text x="848" y="230" font-family="'Geist Mono', monospace" font-size="11" fill="#787774" letter-spacing="1">Interaction to Next Paint</text>
  <!-- Response visual -->
  <circle cx="878" cy="295" r="18" fill="none" stroke="#787774" stroke-width="1.5"/>
  <circle cx="878" cy="295" r="5" fill="#F7F6F3"/>
  <line x1="908" y1="295" x2="980" y2="295" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="980" y1="275" x2="980" y2="315" stroke="#787774" stroke-width="1.5"/>
  <text x="848" y="348" font-family="Georgia, serif" font-size="28" fill="#F7F6F3">&lt; 200ms</text>
  <text x="848" y="370" font-family="'Geist Mono', monospace" font-size="10" fill="#787774" letter-spacing="1">TARGET THRESHOLD</text>

  <!-- Footer label -->
  <text x="600" y="455" font-family="'Geist Mono', monospace" font-size="10" fill="#444444" text-anchor="middle" letter-spacing="2">GOOGLE CORE WEB VITALS · AISTRION.COM</text>
</svg>
